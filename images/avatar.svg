<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <!-- Hand-drawn brush texture -->
    <filter id="brush" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <style>
    .hair { fill: #1a365d; stroke: none; }
    .face-line { fill: none; stroke: #1a365d; stroke-linecap: round; stroke-linejoin: round; }
    .face-fill { fill: #1a365d; stroke: none; }
    .earring { fill: none; stroke: #8ba3c4; stroke-width: 3.5; stroke-linecap: round; }

    /* Gentle floating animation */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    /* Blink animation */
    @keyframes blink {
      0%, 94%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); }
    }

    /* Earring swing */
    @keyframes swing {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }

    /* Smile wiggle */
    @keyframes smile {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(1.03); }
    }

    .avatar-group {
      animation: float 4s ease-in-out infinite;
    }

    .left-eye, .right-eye {
      transform-origin: center;
      animation: blink 4s ease-in-out infinite;
    }
    .right-eye {
      animation-delay: 0.05s;
    }

    .earring-group {
      transform-origin: 295px 210px;
      animation: swing 4s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    .mouth {
      transform-origin: center;
      animation: smile 5s ease-in-out infinite;
    }
  </style>

  <g class="avatar-group" filter="url(#brush)">

    <!-- ===== HAIR - back layer ===== -->
    <!-- Left hair mass flowing down -->
    <path class="hair" d="
      M 130 130
      C 105 140, 85 170, 75 210
      C 65 255, 60 300, 65 350
      C 68 380, 72 410, 80 430
      C 85 440, 95 442, 105 438
      C 112 434, 115 420, 115 400
      C 118 360, 118 320, 120 280
      C 122 250, 125 220, 130 195
      Z"/>

    <!-- Right hair mass flowing down -->
    <path class="hair" d="
      M 275 130
      C 300 145, 320 170, 330 210
      C 340 255, 345 300, 342 350
      C 340 385, 335 415, 325 435
      C 318 445, 308 443, 302 435
      C 296 425, 293 405, 292 380
      C 290 340, 288 300, 285 265
      C 282 235, 278 205, 275 180
      Z"/>

    <!-- ===== HAIR - top mass ===== -->
    <path class="hair" d="
      M 200 62
      C 155 60, 120 75, 108 105
      C 98 130, 95 155, 98 180
      L 105 165
      C 108 140, 115 118, 130 102
      C 148 85, 172 78, 200 78
      C 228 78, 255 85, 272 102
      C 288 118, 296 140, 300 170
      L 305 185
      C 308 155, 306 130, 296 105
      C 284 75, 248 60, 200 62
      Z"/>

    <!-- Hair top volume - left side -->
    <path class="hair" d="
      M 200 62
      C 170 58, 138 62, 118 82
      C 100 100, 90 128, 88 158
      C 86 175, 88 192, 92 200
      C 95 185, 98 165, 102 148
      C 108 125, 120 105, 140 90
      C 158 78, 178 72, 200 70
      Z"/>

    <!-- Hair top volume - right side -->
    <path class="hair" d="
      M 200 62
      C 232 58, 265 62, 286 82
      C 304 100, 314 128, 316 158
      C 318 178, 316 195, 312 205
      C 308 188, 306 168, 302 148
      C 296 125, 284 105, 264 90
      C 246 78, 224 72, 200 70
      Z"/>

    <!-- Part line highlight -->
    <path d="M 198 62 L 200 82" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.15"/>

    <!-- ===== FACE ===== -->

    <!-- Face outline -->
    <path class="face-line" stroke-width="3.5" d="
      M 118 175
      C 115 200, 115 225, 120 250
      C 126 275, 138 298, 155 315
      C 170 330, 185 340, 200 345
      C 215 340, 230 330, 245 315
      C 262 298, 274 275, 280 250
      C 285 225, 285 200, 282 175"/>

    <!-- Left eyebrow -->
    <path class="face-line" stroke-width="3.2" d="
      M 145 185 C 150 178, 162 175, 178 180"/>

    <!-- Right eyebrow -->
    <path class="face-line" stroke-width="3.2" d="
      M 222 180 C 238 175, 250 178, 258 185"/>

    <!-- Left eye -->
    <g class="left-eye">
      <!-- Upper eyelid -->
      <path class="face-line" stroke-width="2.8" d="
        M 148 202 C 153 194, 165 192, 176 198"/>
      <!-- Eye dot -->
      <ellipse class="face-fill" cx="162" cy="204" rx="4" ry="4.5"/>
    </g>

    <!-- Right eye -->
    <g class="right-eye">
      <!-- Upper eyelid -->
      <path class="face-line" stroke-width="2.8" d="
        M 224 198 C 235 192, 247 194, 254 202"/>
      <!-- Eye dot -->
      <ellipse class="face-fill" cx="239" cy="204" rx="4" ry="4.5"/>
    </g>

    <!-- Nose -->
    <path class="face-line" stroke-width="2.5" d="
      M 198 228 C 195 238, 193 248, 198 252 C 202 254, 207 252, 205 246"/>

    <!-- Mouth / smile -->
    <g class="mouth">
      <path class="face-line" stroke-width="2.8" d="
        M 172 278 C 180 290, 195 296, 205 296 C 215 296, 228 290, 235 278"/>
      <!-- Upper lip line -->
      <path class="face-line" stroke-width="2" d="
        M 178 280 C 190 275, 200 274, 210 274 C 220 275, 228 278, 232 280"/>
    </g>

    <!-- Left ear hint -->
    <path class="face-line" stroke-width="2.5" d="
      M 118 195 C 110 198, 106 210, 110 222 C 112 228, 116 230, 118 225"/>

    <!-- ===== EARRING (right side visible) ===== -->
    <g class="earring-group">
      <ellipse class="earring" cx="290" cy="228" rx="8" ry="11"/>
    </g>

    <!-- ===== HAIR - front strands overlay ===== -->
    <!-- Left side hair over face edge -->
    <path class="hair" d="
      M 130 102
      C 118 115, 108 138, 102 160
      C 98 178, 96 195, 95 205
      C 98 195, 102 178, 108 160
      C 114 142, 122 125, 135 112
      Z"/>

    <!-- Right side hair over face edge -->
    <path class="hair" d="
      M 272 102
      C 284 115, 294 138, 300 162
      C 304 178, 306 198, 308 210
      C 305 198, 302 178, 296 160
      C 290 142, 282 125, 268 112
      Z"/>

  </g>
</svg>