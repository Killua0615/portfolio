<!DOCTYPE html>
<html>
	<head>
		<title>Natsumi Teshima</title>
		<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
		<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
		<link rel="stylesheet" type="text/css" href="css/style.css">
	</head>
	<body class="lang-en home-page">
		<div id="top-div">
			<div class="bento-grid">
				<!-- Hero card: name + avatar -->
				<a href="about.html" class="bento-card bento-hero">
					<div class="bento-hero-content">
						<h1 class="bento-name"><span class="natsumi" id="natsumi-home-page">Natsumi Teshima</span></h1>
						<p class="bento-tagline">Software Engineer & Marketer</p>
					</div>
					<div class="bento-hero-image">
						<img src="images/avatar.png" alt="Natsumi Teshima">
					</div>
				</a>

				<!-- Engineering card -->
				<a href="engineering.html" class="bento-card bento-engineering">
					<div class="bento-card-icon"><i class="fas fa-terminal"></i></div>
					<h2 class="bento-card-title">Engineering</h2>
					<p class="bento-card-desc">C / C++ / TypeScript / Ruby on Rails / Docker</p>
					<span class="bento-card-arrow"><i class="fas fa-arrow-right"></i></span>
				</a>

				<!-- Marketing card -->
				<a href="marketing.html" class="bento-card bento-marketing">
					<div class="bento-card-icon"><i class="fas fa-palette"></i></div>
					<h2 class="bento-card-title">Marketing & Branding</h2>
					<p class="bento-card-desc">D2C brand building, crowdfunding, content strategy</p>
					<span class="bento-card-arrow"><i class="fas fa-arrow-right"></i></span>
				</a>

				<!-- Photo card -->
				<div class="bento-card bento-photo">
					<img src="images/photo1.jpg" alt="Photography">
				</div>

				<!-- Social card -->
				<div class="bento-card bento-social">
					<a href="https://github.com/" target="_blank" class="bento-social-link">
						<i class="fab fa-github"></i>
						<span>GitHub</span>
					</a>
					<a href="https://linkedin.com/" target="_blank" class="bento-social-link">
						<i class="fab fa-linkedin"></i>
						<span>LinkedIn</span>
					</a>
					<a href="mailto:natsu.bsk810@gmail.com" class="bento-social-link">
						<i class="fas fa-envelope"></i>
						<span>Email</span>
					</a>
				</div>

				<!-- Location card -->
				<div class="bento-card bento-location">
					<span class="bento-location-pin"><i class="fas fa-map-marker-alt"></i></span>
					<span class="bento-location-text">Tokyo, Japan</span>
				</div>
			</div>
		</div>
		<script src="js/watercolor.js"></script>
	</body>
</html>
