<!DOCTYPE html>
<html>
	<head>
		<title>Natsumi Teshima</title>
		<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
		<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
		<link rel="stylesheet" type="text/css" href="css/style.css">
	</head>
	<body class="lang-en">
		<div id="top-div">
			<div class="lang-toggle" style="position: absolute; top: 20px; right: 20px;">
				<a id="lang-en" class="active" onclick="setLang('en')">EN</a> / <a id="lang-jp" onclick="setLang('jp')">JP</a>
			</div>
			<div id="top-text">
				<h1 id="home-title">
					<span class="lang-en">Hey, I'm <a href="about.html" title="about me"><span class="natsumi" id="natsumi-home-page">Natsumi</span></a>.</span>
					<span class="lang-jp">こんにちは、<a href="about.html" title="about me"><span class="natsumi" id="natsumi-home-page-jp">なつみ</span></a>です。</span>
				</h1>
				<p id="headline">
					<span class="lang-en">I'm a <a href="engineering.html" title="my engineering projects"><span class="engineering" id="engineering-link">Software Engineer</span></a> and a <a href="marketing.html" title="my marketing & branding work"><span class="marketing" id="marketing-link">Marketer</span></a> based in Tokyo.</span>
					<span class="lang-jp">東京を拠点とする<a href="engineering.html" title="my engineering projects"><span class="engineering">ソフトウェアエンジニア</span></a>兼<a href="marketing.html" title="my marketing & branding work"><span class="marketing">マーケター</span></a>です。</span>
				</p>
			</div>
		</div>
		<script src="js/watercolor.js"></script>
		<script>
			function setLang(lang) {
				document.body.className = document.body.className.replace(/lang-\w+/, 'lang-' + lang);
				document.getElementById('lang-en').classList.toggle('active', lang === 'en');
				document.getElementById('lang-jp').classList.toggle('active', lang === 'jp');
				localStorage.setItem('lang', lang);
			}
			(function() {
				var saved = localStorage.getItem('lang');
				if (saved) setLang(saved);
			})();
		</script>
	</body>
</html>
