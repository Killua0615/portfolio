<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natsumi Teshima</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600;700;800&family=M+PLUS+1+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
        :root {
            --bg: #f7f4ee;
            --text: #1d1d1d;
            --muted: #7e786f;
            --accent: #e57c2f;
            --line: rgba(29, 29, 29, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Source Code Pro", "M PLUS 1 Code", monospace;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .home {
            width: min(1200px, calc(100% - 40px));
            min-height: 100vh;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        header,
        footer {
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        header {
            border-bottom: 1px solid var(--line);
        }

        footer {
            border-top: 1px solid var(--line);
            color: var(--muted);
            position: relative;
            z-index: 2;
        }

        .logo {
            font-weight: 800;
        }

        .nav {
            display: flex;
            gap: 22px;
        }

        .nav a {
            transition: color 0.25s ease;
        }

        .nav a:hover,
        .nav a.active {
            color: var(--accent);
        }

        .burger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            z-index: 200;
        }

        .burger span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .burger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .burger.active span:nth-child(2) {
            opacity: 0;
        }

        .burger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        main {
            display: flex;
            align-items: center;
            padding: 72px 0;
        }

        .hero {
            width: min(900px, 100%);
        }

        .bubble {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 0 34px 5%;
            padding: 14px 24px 15px;
            border: 1.5px solid var(--text);
            border-radius: 48% 52% 46% 54% / 58% 44% 56% 42%;
            background: transparent;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            transform: rotate(-2deg);
        }

        .bubble::before {
            content: "";
            position: absolute;
            right: 18px;
            bottom: -8px;
            width: 16px;
            height: 16px;
            border-right: 1.5px solid var(--text);
            border-bottom: 1.5px solid var(--text);
            background: transparent;
            transform: rotate(36deg) skew(-8deg, -8deg);
        }

        .bubble::after {
            content: "";
            position: absolute;
            inset: 3px -3px -3px 3px;
            border: 1px solid rgba(229, 124, 47, 0.5);
            border-radius: 52% 48% 55% 45% / 46% 58% 42% 54%;
            z-index: -1;
        }

        h1 {
            margin: 0;
            font-size: clamp(4.4rem, 11vw, 10rem);
            line-height: 0.84;
            letter-spacing: -0.08em;
            font-weight: 800;
        }

        .name-link {
            display: inline-block;
            position: relative;
        }

        .first-name,
        .last-name {
            display: block;
            transition:
                transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                letter-spacing 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .last-name {
            color: var(--accent);
            margin-left: 0.42em;
        }

        .name-link:hover .first-name {
            transform: translateX(0.08em);
            letter-spacing: -0.065em;
        }

        .name-link:hover .last-name {
            transform: translateX(-0.08em);
            letter-spacing: -0.065em;
        }

        .description {
            margin: 40px 0 0;
            color: var(--muted);
            font-size: clamp(1.05rem, 2vw, 1.4rem);
            line-height: 1.7;
        }

        .description .eng {
            color: #4a8b8c;
        }

        .description .mkt {
            color: #8b6aae;
        }

        .description a {
            position: relative;
            font-weight: 700;
            transition:
                color 0.25s ease,
                transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            display: inline-block;
        }

        .description a::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -3px;
            width: 100%;
            height: 2px;
            background: currentColor;
            transform: translateX(-50%) scaleX(0);
            transform-origin: center;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .description a:hover {
            transform: translateY(-2px);
        }

        .description a:hover::after {
            transform: translateX(-50%) scaleX(1);
        }

        @media (max-width: 640px) {
            .home {
                width: min(100% - 24px, 1200px);
            }

            header,
            footer {
                min-height: 64px;
            }

            .burger {
                display: flex;
            }

            .nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: var(--bg);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 32px;
                font-size: 1.2rem;
                z-index: 150;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }

            .nav.open {
                opacity: 1;
                pointer-events: auto;
            }

            main {
                padding: 52px 0;
            }

            .bubble {
                margin-left: 2%;
                margin-bottom: 28px;
                padding: 12px 20px 13px;
            }

            h1 {
                font-size: clamp(4rem, 19vw, 6.8rem);
            }

            .last-name {
                margin-left: 0.18em;
            }

            .description {
                margin-top: 32px;
            }
        }

        .houses {
            position: fixed;
            bottom: 72px;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: -1;
            line-height: 0;
        }

        .houses img {
            width: 100%;
            display: block;
            opacity: 0.4;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="home">
        <header>
            <nav class="nav" id="nav">
                <a href="index.html" class="active">Home</a>
                <a href="about.html">About</a>
                <a href="engineering.html">Engineering</a>
                <a href="marketing.html">Marketing</a>
            </nav>
            <div class="burger" id="burger" onclick="document.getElementById('nav').classList.toggle('open');this.classList.toggle('active')">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>

        <main>
            <section class="hero">
                <div class="bubble">Welcome</div>

                <h1>
                    <a class="name-link" href="about.html">
                        <span class="first-name">Natsumi</span>
                        <span class="last-name">Teshima</span>
                    </a>
                </h1>

                <p class="description">
                    I'm a
                    <a class="eng" href="engineering.html">Software Engineer</a>
                    and a
                    <a class="mkt" href="marketing.html">Marketer</a>.
                </p>
            </section>
        </main>

        <footer>
            <span>Portfolio</span>
            <span>2026</span>
        </footer>
    </div>
    <div class="houses">
        <img src="images/amsterdam_houses.png" alt="Amsterdam canal houses">
    </div>
    <script src="js/watercolor.js"></script>
</body>
</html>
